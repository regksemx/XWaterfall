name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure git identity
        run: |
          git config --global user.name "regksem"
          git config --global user.email "regksem@tuta.io"

      - name: Build
        run: ./waterfall b

      - name: Stage jar
        id: stage
        run: |
          version="${GITHUB_REF_NAME}"
          out="XWaterfall-${version}.jar"
          cp Waterfall-Proxy/bootstrap/target/XWaterfall.jar "$out"
          echo "jar=$out" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.jar }}
          path: ${{ steps.stage.outputs.jar }}

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.stage.outputs.jar }}
          generate_release_notes: true
